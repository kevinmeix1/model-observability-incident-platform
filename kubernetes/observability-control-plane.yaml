apiVersion: v1
kind: Namespace
metadata:
  name: ml-observability
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-observability-runner
  namespace: ml-observability
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: model-observability-policy
  namespace: ml-observability
data:
  PSI_THRESHOLD: "0.20"
  MAX_ERROR_RATE: "0.02"
  LATENCY_P95_MS: "85"
  INCIDENT_DEDUPE: fingerprint
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: model-observability-runner
  namespace: ml-observability
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["create", "get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: model-observability-runner
  namespace: ml-observability
subjects:
  - kind: ServiceAccount
    name: model-observability-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: model-observability-runner
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: model-observability-hourly
  namespace: ml-observability
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 6
  failedJobsHistoryLimit: 12
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          serviceAccountName: model-observability-runner
          restartPolicy: Never
          containers:
            - name: observability-cycle
              image: ghcr.io/kevinmeix1/model-observability-incident-platform:latest
              command: ["bash", "-lc"]
              args:
                - "make demo"
              envFrom:
                - configMapRef:
                    name: model-observability-policy
              resources:
                requests:
                  cpu: "250m"
                  memory: "512Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
