apiVersion: v1
kind: ConfigMap
metadata:
  name: kueue-elastic-incident-rollout
  namespace: mlops-observability
  labels:
    app.kubernetes.io/name: model-observability-incident-platform
    platform.openai.com/component: elastic-workloads
data:
  featureGate: ElasticJobsViaWorkloadSlices
  incidentBoundary: "Incident creation and alert routing stay outside elastic backlog queues."
  rollbackFreezePolicy: "Replacement Workload Slices shrink drift backlog before delaying high-severity incident analysis."
---
apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: incident-root-cause-fanout
  namespace: mlops-observability
  labels:
    app.kubernetes.io/name: model-observability-incident-platform
    kueue.x-k8s.io/queue-name: incident-critical-queue
  annotations:
    kueue.x-k8s.io/workload-slice-name: incident-fanout-slice-a
    kueue.x-k8s.io/elastic-job: "true"
spec:
  replicatedJobs:
    - name: asset-probe
      replicas: 12
      template:
        spec:
          completions: 1
          parallelism: 1
          backoffLimit: 2
          template:
            metadata:
              labels:
                app.kubernetes.io/component: root-cause-analysis
                severity: high
            spec:
              restartPolicy: Never
              serviceAccountName: incident-responder
              containers:
                - name: root-cause-probe
                  image: ghcr.io/kevinmeix1/model-observability-incident-platform:2026.07.0
                  args:
                    - python
                    - -m
                    - model_observability_platform
                    - reliability-plan
                  resources:
                    requests:
                      cpu: "500m"
                      memory: 512Mi
                    limits:
                      cpu: "1"
                      memory: 1Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: drift-check-replacement-slice
  namespace: mlops-observability
  labels:
    app.kubernetes.io/name: model-observability-incident-platform
    kueue.x-k8s.io/queue-name: observability-checks-queue
  annotations:
    kueue.x-k8s.io/workload-slice-name: drift-check-slice-b
    kueue.x-k8s.io/workload-slice-replacement-for: mlops-observability/drift-check-slice-a
    kueue.x-k8s.io/elastic-job: "true"
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/component: drift-backlog
        severity: low
    spec:
      restartPolicy: Never
      serviceAccountName: drift-evaluator
      containers:
        - name: drift-check
          image: ghcr.io/kevinmeix1/model-observability-incident-platform:2026.07.0
          args:
            - python
            - -m
            - model_observability_platform
            - reliability-plan
          resources:
            requests:
              cpu: "750m"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
---
apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: gpu-drift-diagnostic
  namespace: mlops-observability
  labels:
    app.kubernetes.io/name: model-observability-incident-platform
    kueue.x-k8s.io/queue-name: observability-gpu-diagnostics-queue
  annotations:
    kueue.x-k8s.io/workload-slice-name: gpu-diagnostic-slice-a
    kueue.x-k8s.io/elastic-job: "true"
spec:
  replicatedJobs:
    - name: embedding-drift
      replicas: 4
      template:
        spec:
          completions: 1
          parallelism: 1
          backoffLimit: 1
          template:
            metadata:
              labels:
                app.kubernetes.io/component: gpu-diagnostic
                severity: high
            spec:
              restartPolicy: Never
              serviceAccountName: incident-responder
              containers:
                - name: diagnostic
                  image: ghcr.io/kevinmeix1/model-observability-incident-platform:2026.07.0
                  args:
                    - python
                    - -m
                    - model_observability_platform
                    - trace-report
                  resources:
                    requests:
                      cpu: "1"
                      memory: 2Gi
                      nvidia.com/gpu: "1"
                    limits:
                      cpu: "2"
                      memory: 4Gi
                      nvidia.com/gpu: "1"
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: observability-elastic-workload-alerts
  namespace: mlops-observability
  labels:
    app.kubernetes.io/name: model-observability-incident-platform
    prometheus: platform
spec:
  groups:
    - name: observability.elastic-workloads
      rules:
        - alert: ObservabilityElasticWorkloadSlicePending
          expr: sum(kueue_pending_workloads{namespace="mlops-observability",queue=~"(incident|observability).*"}) by (queue) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Elastic incident Workload Slice is pending.
            runbook: "Check Kueue ClusterQueue quota before expanding root-cause fanout."
        - alert: ObservabilityElasticReplacementSliceLag
          expr: sum(kueue_admitted_workloads{namespace="mlops-observability",workload=~".*drift.*"}) < 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Replacement Workload Slice is not reclaiming drift backlog quota.
            runbook: "Pause low-priority drift backlog and reserve incident-response capacity."
        - alert: ObservabilityElasticJobSetReplicaLag
          expr: sum(jobset_replicatedjob_replicas_ready{namespace="mlops-observability",jobset=~"(incident|gpu).*"}) < 2
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Elastic JobSet replicas are below incident analysis target.
            runbook: "Inspect JobSet pods, image pull errors, Kueue admission, and GPU node availability."
