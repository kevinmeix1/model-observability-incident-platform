apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: cpu-on-demand
spec:
  nodeLabels:
    workload-class: observability-on-demand
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: cpu-spot
spec:
  nodeLabels:
    workload-class: observability-spot
  tolerations:
    - key: spot
      operator: Equal
      value: "true"
      effect: NoSchedule
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: gpu-l4-reserved
spec:
  nodeLabels:
    accelerator: nvidia-l4
    capacity-class: reserved
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: gpu-l4-spot
spec:
  nodeLabels:
    accelerator: nvidia-l4
    capacity-class: spot
  tolerations:
    - key: spot
      operator: Equal
      value: "true"
      effect: NoSchedule
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: incident-diagnostics-flavor-queue
spec:
  namespaceSelector:
    matchLabels:
      platform.mlops.dev/tenant: incident-response
  queueingStrategy: BestEffortFIFO
  flavorFungibility:
    whenCanBorrow: TryNextFlavor
    whenCanPreempt: TryNextFlavor
    preference: BorrowingOverPreemption
  resourceGroups:
    - coveredResources: ["cpu", "memory"]
      flavors:
        - name: cpu-on-demand
          resources:
            - name: cpu
              nominalQuota: 18
              borrowingLimit: 4
            - name: memory
              nominalQuota: 72Gi
              borrowingLimit: 16Gi
        - name: cpu-spot
          resources:
            - name: cpu
              nominalQuota: 6
              borrowingLimit: 6
            - name: memory
              nominalQuota: 24Gi
              borrowingLimit: 24Gi
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: embedding-drift-flavor-queue
spec:
  namespaceSelector:
    matchLabels:
      platform.mlops.dev/tenant: drift-monitoring
  queueingStrategy: BestEffortFIFO
  flavorFungibility:
    whenCanBorrow: TryNextFlavor
    whenCanPreempt: TryNextFlavor
    preference: BorrowingOverPreemption
  resourceGroups:
    - coveredResources: ["nvidia.com/gpu"]
      flavors:
        - name: gpu-l4-reserved
          resources:
            - name: nvidia.com/gpu
              nominalQuota: 1
              borrowingLimit: 1
        - name: gpu-l4-spot
          resources:
            - name: nvidia.com/gpu
              nominalQuota: 2
              borrowingLimit: 2
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: retention-maintenance-flavor-queue
spec:
  namespaceSelector:
    matchLabels:
      platform.mlops.dev/tenant: retention-maintenance
  queueingStrategy: BestEffortFIFO
  flavorFungibility:
    whenCanBorrow: TryNextFlavor
    whenCanPreempt: TryNextFlavor
    preference: BorrowingOverPreemption
  resourceGroups:
    - coveredResources: ["cpu", "memory"]
      flavors:
        - name: cpu-spot
          resources:
            - name: cpu
              nominalQuota: 10
              borrowingLimit: 6
            - name: memory
              nominalQuota: 40Gi
              borrowingLimit: 24Gi
        - name: cpu-on-demand
          resources:
            - name: cpu
              nominalQuota: 2
              borrowingLimit: 1
            - name: memory
              nominalQuota: 8Gi
              borrowingLimit: 4Gi
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: embedding-drift
  namespace: ml-observability-drift
spec:
  clusterQueue: embedding-drift-flavor-queue
