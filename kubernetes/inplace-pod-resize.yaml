apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-inplace-pod-resize-runbook
  namespace: mlops-observability
data:
  embedding-drift-cpu-resize.sh: |
    kubectl patch pod embedding-drift-check-0 \
      -n mlops-observability \
      --subresource resize \
      --type merge \
      --patch '{"spec":{"containers":[{"name":"embedding-drift","resources":{"requests":{"cpu":"1200m"},"limits":{"cpu":"1500m","memory":"1536Mi"}}}]}}'
  incident-fanout-pod-level-resize.sh: |
    kubectl patch pod incident-root-cause-probe-0 \
      -n mlops-observability \
      --subresource resize \
      --type merge \
      --patch '{"spec":{"resources":{"requests":{"memory":"8Gi"},"limits":{"cpu":"6","memory":"12Gi"}}}}'
  observe-resize-status.sh: |
    kubectl get pod embedding-drift-check-0 -n mlops-observability -o jsonpath='{.status.conditions[?(@.type=="PodResizePending")].reason}{"\n"}{.status.conditions[?(@.type=="PodResizeInProgress")].reason}{"\n"}{.status.containerStatuses[*].resources}'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-drift-check
  namespace: mlops-observability
  labels:
    app.kubernetes.io/name: embedding-drift-check
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: embedding-drift-check
  template:
    metadata:
      labels:
        app.kubernetes.io/name: embedding-drift-check
    spec:
      resources:
        requests:
          cpu: "500m"
          memory: "1Gi"
        limits:
          cpu: "2"
          memory: "2Gi"
      containers:
        - name: embedding-drift
          image: ghcr.io/kevinmeix1/observability-drift-check:2026.07.08
          imagePullPolicy: IfNotPresent
          resizePolicy:
            - resourceName: cpu
              restartPolicy: NotRequired
            - resourceName: memory
              restartPolicy: RestartContainer
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: embedding-drift-inplace-or-recreate
  namespace: mlops-observability
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: embedding-drift-check
  updatePolicy:
    updateMode: InPlaceOrRecreate
  resourcePolicy:
    containerPolicies:
      - containerName: embedding-drift
        controlledResources: ["cpu", "memory"]
        minAllowed:
          cpu: "100m"
          memory: "256Mi"
        maxAllowed:
          cpu: "2"
          memory: "2Gi"
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: observability-inplace-pod-resize
  namespace: mlops-observability
spec:
  groups:
    - name: observability.inplace.pod.resize
      rules:
        - alert: ObservabilityInPlaceResizePendingTooLong
          expr: kube_pod_status_condition{namespace="mlops-observability",condition="PodResizePending",status="true"} > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "An observability resize is pending capacity admission"
        - alert: ObservabilityInPlaceResizeInProgressTooLong
          expr: kube_pod_status_condition{namespace="mlops-observability",condition="PodResizeInProgress",status="true"} > 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "An observability resize is admitted but not fully applied to cgroups"
