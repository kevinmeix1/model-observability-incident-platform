apiVersion: v1
kind: Namespace
metadata:
  name: mlops-observability-dra-admin
  labels:
    resource.kubernetes.io/admin-access: "true"
    pod-security.kubernetes.io/enforce: restricted
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dra-admin-diagnostic-runner
  namespace: mlops-observability-dra-admin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dra-admin-access-claim-manager
  namespace: mlops-observability-dra-admin
rules:
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceclaims", "resourceclaimtemplates"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dra-admin-access-claim-manager
  namespace: mlops-observability-dra-admin
subjects:
  - kind: ServiceAccount
    name: dra-admin-diagnostic-runner
    namespace: mlops-observability-dra-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dra-admin-access-claim-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: observability-status-reader
  namespace: mlops-observability
rules:
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dra-admin-diagnostic-observability-reader
  namespace: mlops-observability
subjects:
  - kind: ServiceAccount
    name: dra-admin-diagnostic-runner
    namespace: mlops-observability-dra-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: observability-status-reader
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: embedding-drift-admin-health
  namespace: mlops-observability-dra-admin
  labels:
    mlops.io/diagnostic-purpose: admin-access-observability-health
    mlops.io/target-workload: embedding-drift-check
  annotations:
    mlops.io/cleanup-after-minutes: "15"
    mlops.io/incident-required: "true"
    mlops.io/paging-must-remain-live: "true"
spec:
  devices:
    requests:
      - name: gpu
        exactly:
          deviceClassName: gpu-l4-shared
          allocationMode: All
          adminAccess: true
          selectors:
            - cel:
                expression: "device.driver == 'gpu.resource.kubernetes.io'"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: observability-dra-admin-access-snapshot
  namespace: mlops-observability-dra-admin
  labels:
    mlops.io/component: dra-admin-access-diagnostics
spec:
  ttlSecondsAfterFinished: 900
  template:
    metadata:
      labels:
        mlops.io/component: dra-admin-access-diagnostics
    spec:
      serviceAccountName: dra-admin-diagnostic-runner
      restartPolicy: Never
      containers:
        - name: collect-incident-evidence
          image: ghcr.io/kevinmeix1/observability-diagnostic-runner:2026.07.08
          imagePullPolicy: IfNotPresent
          args:
            - "--claim=embedding-drift-admin-health"
            - "--target-namespace=mlops-observability"
            - "--target-workload=embedding-drift-check"
            - "--evidence=allocatedResourcesStatus,ResourceClaim.status.devices,incident.id,monitor.name,rollout.freeze_state"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: observability-dra-admin-access-diagnostics
  namespace: mlops-observability-dra-admin
spec:
  groups:
    - name: observability.dra.admin.access
      rules:
        - alert: ObservabilityDRAAdminAccessClaimRunningTooLong
          expr: kube_resourceclaim_created{namespace="mlops-observability-dra-admin"} > 900
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "A privileged observability DRA AdminAccess ResourceClaim exceeded its cleanup window"
        - alert: ObservabilityDRAAdminAccessWithoutIncident
          expr: kube_resourceclaim_labels{namespace="mlops-observability-dra-admin",label_mlops_io_incident_required!="true"} > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "A privileged observability DRA AdminAccess claim is missing incident linkage"
