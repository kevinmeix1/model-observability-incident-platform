apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: observability-collector-pod-kill
  namespace: ml-observability
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces: ["ml-observability"]
    labelSelectors:
      app.kubernetes.io/name: model-observability-incident-platform
  duration: "30s"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: prediction-log-ingestion-delay
  namespace: ml-observability
spec:
  action: delay
  mode: all
  selector:
    namespaces: ["ml-observability"]
    labelSelectors:
      app.kubernetes.io/component: event-driven-checks
  delay:
    latency: "600ms"
    correlation: "25"
    jitter: "100ms"
  duration: "3m"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: incident-worker-cpu-pressure
  namespace: ml-observability
spec:
  mode: one
  selector:
    namespaces: ["ml-observability"]
    labelSelectors:
      app.kubernetes.io/component: admission-smoke
  stressors:
    cpu:
      workers: 1
      load: 60
  duration: "2m"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: weekly-observability-chaos-drill
  namespace: ml-observability
spec:
  schedule: "0 8 * * 1"
  type: PodChaos
  historyLimit: 3
  concurrencyPolicy: Forbid
  podChaos:
    action: pod-kill
    mode: one
    selector:
      namespaces: ["ml-observability"]
      labelSelectors:
        app.kubernetes.io/name: model-observability-incident-platform
    duration: "30s"
