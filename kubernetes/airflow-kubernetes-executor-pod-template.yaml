apiVersion: v1
kind: Pod
metadata:
  name: airflow-observability-worker-template
  namespace: ml-observability
  labels:
    app.kubernetes.io/name: model-observability-incident-platform
    app.kubernetes.io/component: airflow-worker-template
spec:
  serviceAccountName: model-observability-runner
  priorityClassName: observability-incident-priority
  restartPolicy: Never
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: model-observability-incident-platform
  initContainers:
    - name: validate-policy
      image: busybox:1.36
      command: ["sh", "-c", "test -n \"$PSI_THRESHOLD\" && test -n \"$MAX_ERROR_RATE\""]
      envFrom:
        - configMapRef:
            name: model-observability-policy
  containers:
    - name: base
      image: ghcr.io/kevinmeix1/model-observability-incident-platform:2026.07.0
      command: ["bash", "-lc", "make demo"]
      envFrom:
        - configMapRef:
            name: model-observability-policy
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 2Gi
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
