name: Model Observability CI

on:
  push:
  pull_request:

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  demo-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Static Python compile
        run: PYTHONPATH=src python3 -m compileall -q src tests
      - name: Run deterministic demo
        run: make demo
      - name: Validate generated artifacts
        run: make ci-verify
      - name: Run tests
        run: make test
      - name: Build CI summary
        if: always()
        run: |
          {
            echo "### Model observability demo artifacts"
            echo ""
            echo "- Dashboard: .local/reports/model_observability_dashboard.html"
            echo "- Governance evidence: .local/reports/governance_evidence_bundle.json"
            echo "- SLO report: .local/reports/slo_error_budget.json"
            echo "- Cloud migration plan: .local/reports/cloud_migration_plan.json"
            echo "- Supply-chain evidence: .local/reports/supply_chain_evidence.json"
            echo "- Orchestration scorecard: .local/reports/orchestration_scorecard.json"
            echo "- Accelerator capacity plan: .local/reports/accelerator_capacity_plan.json"
            echo "- Device allocation plan: .local/reports/device_allocation_plan.json"
            echo "- DRA resource health status: .local/reports/resource_health_status_plan.json"
            echo "- Topology placement plan: .local/reports/topology_placement_plan.json"
            echo "- KubeRay capacity plan: .local/reports/kuberay_capacity_plan.json"
            echo "- Inference gateway plan: .local/reports/inference_gateway_plan.json"
            echo "- Semantic telemetry plan: .local/reports/semantic_telemetry_plan.json"
            echo "- Deadline alert plan: .local/reports/deadline_alert_plan.json"
            echo "- Cost observability: .local/reports/cost_observability_report.json"
            echo "- Elastic workload plan: .local/reports/elastic_workload_plan.json"
            echo "- Indexed job resilience: .local/reports/indexed_job_resilience_plan.json"
            echo "- Provisioning admission: .local/reports/provisioning_admission_plan.json"
            echo "- MultiKueue dispatch: .local/reports/multikueue_dispatch_plan.json"
            echo "- DAG bundle versioning: .local/reports/dag_bundle_versioning_plan.json"
            echo "- Event-driven assets: .local/reports/event_driven_assets_plan.json"
            echo "- Pod resource envelopes: .local/reports/pod_resource_envelope_plan.json"
            echo "- Cohort fair sharing: .local/reports/cohort_fair_sharing_plan.json"
            echo "- Flavor fungibility: .local/reports/flavor_fungibility_plan.json"
            echo "- Pending workload visibility: .local/reports/pending_workload_visibility_plan.json"
            echo "- Tenant fairness: .local/reports/tenancy_fairness_report.json"
            echo "- Workload identity: .local/reports/identity_access_report.json"
            echo "- Performance budget: .local/reports/performance_budget.json"
            echo "- Queue simulation: .local/reports/queue_simulation.json"
            echo "- Incident evidence volumes: .local/reports/incident_evidence_volume_plan.json"
            echo "- Release admission: .local/reports/release_admission_decision.json"
            echo ""
            echo "Generated reports:"
            find .local/reports -maxdepth 1 -type f | sort | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload demo artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: model-observability-demo-artifacts
          path: |
            .local/reports
            .local/governance
            .local/incidents
            .local/data
          if-no-files-found: error
      - name: Attest demo report provenance
        if: github.event_name == 'push'
        uses: actions/attest@v4
        with:
          subject-path: ${{ github.workspace }}/.local/reports/**
