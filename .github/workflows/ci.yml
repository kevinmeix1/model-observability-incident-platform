name: Model Observability CI

on:
  push:
  pull_request:

jobs:
  demo-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run deterministic demo
        run: make demo
      - name: Run tests
        run: make test
