apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-dra-advanced-device-sharing-examples
  namespace: mlops-observability
data:
  prioritized-list-resourceclaimtemplate.yaml: |
    apiVersion: resource.k8s.io/v1
    kind: ResourceClaimTemplate
    metadata:
      name: embedding-drift-prioritized-accelerator
      namespace: mlops-observability
    spec:
      spec:
        devices:
          requests:
            - name: diagnostic-accelerator
              prioritizedList:
                - deviceClassName: gpu-l4-shared
                  count: 1
                - deviceClassName: gpu-a100-mig
                  count: 1
                - deviceClassName: cpu-psi-only
                  count: 1
  partitionable-resource-slice.yaml: |
    apiVersion: resource.k8s.io/v1
    kind: ResourceSlice
    metadata:
      name: a100-partitionable-drift-backlog
    spec:
      driver: gpu.resource.kubernetes.io
      pool:
        name: observability-a100-pool
        generation: 1
        resourceSliceCount: 1
      devices:
        - name: a100-drift-parent-0
          partitionable: true
          attributes:
            model:
              string: A100
            partitioning:
              string: mig
  consumable-capacity-request.yaml: |
    apiVersion: resource.k8s.io/v1
    kind: ResourceClaimTemplate
    metadata:
      name: drift-backlog-consumable-gpu
      namespace: mlops-observability
    spec:
      spec:
        devices:
          requests:
            - name: drift-vgpu-memory
              deviceClassName: partitionable-a100
              capacity:
                requests:
                  memory: 3Gi
              constraints:
                - distinctAttribute: device-id
  binding-conditions-resource-slice.yaml: |
    apiVersion: resource.k8s.io/v1
    kind: ResourceSlice
    metadata:
      name: large-monitor-review-fabric-a100
    spec:
      driver: gpu.resource.kubernetes.io
      pool:
        name: observability-fabric-a100-pool
        generation: 1
        resourceSliceCount: 1
      devices:
        - name: fabric-a100-monitor-0
          bindsToNode: true
          bindingConditions:
            - gpu.resource.kubernetes.io/is-prepared
          bindingFailureConditions:
            - gpu.resource.kubernetes.io/preparing-failed
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: observability-dra-advanced-device-sharing
  namespace: mlops-observability
spec:
  groups:
    - name: observability.dra.advanced.device.sharing
      rules:
        - alert: ObservabilityDRADeviceBindingWaitHigh
          expr: histogram_quantile(0.95, sum(rate(kube_scheduler_plugin_duration_seconds_bucket{plugin="DynamicResources",extension_point="PreBind"}[5m])) by (le)) > 30
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "DRA device binding conditions are slowing heavy monitor review"
        - alert: ObservabilityDRAConsumableCapacityExhausted
          expr: sum(kube_resourceclaim_status_allocation_capacity{namespace="mlops-observability",resource=~"memory|bandwidth"}) by (namespace, resource) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "DRA consumable capacity is saturated for observability diagnostics"
