apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: observed-inference-health-route
  namespace: ml-observability
spec:
  parentRefs:
    - name: shared-inference-gateway
      namespace: mlops-serving
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /internal/inference-health
      backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: observed-diagnostic-inference-pool
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: diagnostic-model-server
  namespace: ml-observability
  labels:
    app: diagnostic-model-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: diagnostic-model-server
  template:
    metadata:
      labels:
        app: diagnostic-model-server
        observability.ml/role: diagnostic-replay
    spec:
      containers:
        - name: model-server
          image: ghcr.io/kevinmeix1/diagnostic-model-server@sha256:replace-with-approved-digest
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              cpu: "250m"
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: observability-endpoint-picker
  namespace: ml-observability
  labels:
    app: observability-epp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: observability-epp
  template:
    metadata:
      labels:
        app: observability-epp
    spec:
      containers:
        - name: epp
          image: registry.k8s.io/gateway-api-inference-extension/epp@sha256:replace-with-approved-digest
          args:
            - --pool-name
            - observed-diagnostic-inference-pool
            - --pool-namespace
            - ml-observability
          ports:
            - name: ext-proc
              containerPort: 9002
            - name: grpc-health
              containerPort: 9003
          readinessProbe:
            grpc:
              port: 9003
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: observability-endpoint-picker
  namespace: ml-observability
spec:
  selector:
    app: observability-epp
  ports:
    - name: ext-proc
      protocol: TCP
      port: 9002
      targetPort: 9002
      appProtocol: http2
---
apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: observed-diagnostic-inference-pool
  namespace: ml-observability
spec:
  targetPorts:
    - number: 8000
  selector:
    app: diagnostic-model-server
  endpointPickerRef:
    name: observability-endpoint-picker
    port:
      number: 9002
    failureMode: FailOpen
---
apiVersion: inference.networking.x-k8s.io/v1alpha2
kind: InferenceObjective
metadata:
  name: incident-diagnostic-replay
  namespace: ml-observability
spec:
  priority: -5
  poolRef:
    group: inference.networking.k8s.io
    kind: InferencePool
    name: observed-diagnostic-inference-pool
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: inference-gateway-observability
  namespace: ml-observability
spec:
  groups:
    - name: inference.gateway.observability
      rules:
        - alert: ObservedEndpointPickerUnavailable
          expr: up{job="observability-endpoint-picker"} == 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Observed endpoint picker is unavailable; incident response should freeze model canaries."
