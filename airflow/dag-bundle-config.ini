[dag_processor]
disable_bundle_versioning = False
dag_bundle_config_list = [
  {
    "name": "model-observability-bundle",
    "classpath": "airflow.providers.git.bundles.git.GitDagBundle",
    "kwargs": {
      "git_conn_id": "github_dag_bundle",
      "tracking_ref": "main",
      "subdir": "airflow/dags",
      "refresh_interval": 60,
      "sparse_dirs": ["airflow/dags", "kubernetes", "contracts", "src"]
    },
    "team_name": "ml-observability"
  }
]

[core]
rerun_with_latest_version = False
multi_team = True
executor = LocalExecutor;ml-observability=KubernetesExecutor
