apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-evidence-volume-contract
  namespace: ml-observability
  labels:
    app.kubernetes.io/name: model-observability-incident-platform
    app.kubernetes.io/component: incident-evidence
data:
  contract.yaml: |
    feature_state: Kubernetes v1.36 stable image volume
    minimum_server_version: v1.31
    recommended_server_version: v1.36
    pull_policy: IfNotPresent
    fallback_path: object-store incident evidence bundles
    preserve_rollout_freeze_on_missing_evidence: true
    evidence:
      - name: telemetry-reference-window
        mountPath: /mnt/evidence/reference-window
      - name: incident-policy-bundle
        mountPath: /mnt/evidence/policies
      - name: golden-incident-examples
        mountPath: /mnt/evidence/golden-incidents
      - name: runbook-bundle
        mountPath: /mnt/evidence/runbooks
---
apiVersion: batch/v1
kind: Job
metadata:
  name: observability-evidence-volume-smoke
  namespace: ml-observability
  labels:
    app.kubernetes.io/name: model-observability-incident-platform
    app.kubernetes.io/component: incident-evidence
    kueue.x-k8s.io/queue-name: observability-checks-queue
  annotations:
    mlops.kevinmei.dev/evidence: incident_evidence_volume_plan.json
    mlops.kevinmei.dev/fallback: object-store-incident-evidence
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 1800
  template:
    metadata:
      labels:
        app.kubernetes.io/name: model-observability-incident-platform
        app.kubernetes.io/component: incident-evidence
        observability.kevinmei.dev/evidence-locality: oci-image-volume
    spec:
      restartPolicy: Never
      serviceAccountName: model-observability-runner
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: evidence-smoke
          image: ghcr.io/kevinmeix1/model-observability-incident-platform:2026.07.0
          imagePullPolicy: IfNotPresent
          command:
            - bash
            - -lc
            - |
              set -euo pipefail
              find /mnt/evidence -maxdepth 2 -type f | sort | head -20
              test -d /mnt/evidence/reference-window
              test -d /mnt/evidence/policies
              test -d /mnt/evidence/golden-incidents
              test -d /mnt/evidence/runbooks
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: reference-window
              mountPath: /mnt/evidence/reference-window
              readOnly: true
            - name: policy-bundle
              mountPath: /mnt/evidence/policies
              readOnly: true
            - name: golden-incidents
              mountPath: /mnt/evidence/golden-incidents
              readOnly: true
            - name: runbook-bundle
              mountPath: /mnt/evidence/runbooks
              readOnly: true
            - name: evidence-contract
              mountPath: /etc/mlops/evidence-contract
              readOnly: true
      volumes:
        - name: reference-window
          image:
            reference: ghcr.io/kevinmeix1/observability-reference-window@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
            pullPolicy: IfNotPresent
        - name: policy-bundle
          image:
            reference: ghcr.io/kevinmeix1/observability-policy-bundle@sha256:bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
            pullPolicy: IfNotPresent
        - name: golden-incidents
          image:
            reference: ghcr.io/kevinmeix1/observability-golden-incidents@sha256:cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
            pullPolicy: IfNotPresent
        - name: runbook-bundle
          image:
            reference: ghcr.io/kevinmeix1/observability-runbooks@sha256:dddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddd
            pullPolicy: IfNotPresent
        - name: evidence-contract
          configMap:
            name: observability-evidence-volume-contract
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: observability-evidence-volume-warmup
  namespace: ml-observability
  labels:
    app.kubernetes.io/name: model-observability-incident-platform
    app.kubernetes.io/component: incident-evidence
spec:
  schedule: "*/20 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 900
      template:
        metadata:
          labels:
            app.kubernetes.io/name: model-observability-incident-platform
            observability.kevinmei.dev/evidence-locality: warmup
        spec:
          restartPolicy: Never
          serviceAccountName: model-observability-runner
          containers:
            - name: evidence-warmup
              image: ghcr.io/kevinmeix1/model-observability-incident-platform:2026.07.0
              imagePullPolicy: IfNotPresent
              command: ["bash", "-lc", "du -sh /mnt/evidence/* || true"]
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "256Mi"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: reference-window
                  mountPath: /mnt/evidence/reference-window
                  readOnly: true
                - name: policy-bundle
                  mountPath: /mnt/evidence/policies
                  readOnly: true
                - name: golden-incidents
                  mountPath: /mnt/evidence/golden-incidents
                  readOnly: true
                - name: runbook-bundle
                  mountPath: /mnt/evidence/runbooks
                  readOnly: true
          volumes:
            - name: reference-window
              image:
                reference: ghcr.io/kevinmeix1/observability-reference-window@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
                pullPolicy: IfNotPresent
            - name: policy-bundle
              image:
                reference: ghcr.io/kevinmeix1/observability-policy-bundle@sha256:bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
                pullPolicy: IfNotPresent
            - name: golden-incidents
              image:
                reference: ghcr.io/kevinmeix1/observability-golden-incidents@sha256:cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
                pullPolicy: IfNotPresent
            - name: runbook-bundle
              image:
                reference: ghcr.io/kevinmeix1/observability-runbooks@sha256:dddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddd
                pullPolicy: IfNotPresent
