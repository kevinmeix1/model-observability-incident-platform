apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: observability-on-demand
spec:
  template:
    metadata:
      labels:
        workload-tier: observability
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: observability-default
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
  limits:
    cpu: "64"
    memory: 256Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 10m
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: observability-default
spec:
  role: eks-auto-mode-node-role
  subnetSelectorTerms:
    - tags:
        kubernetes.io/role/internal-elb: "1"
  securityGroupSelectorTerms:
    - tags:
        app.kubernetes.io/part-of: model-observability-incident-platform
  tags:
    cost-center: ml-reliability
    workload: observability-incident-response
