apiVersion: velero.io/v1
kind: BackupStorageLocation
metadata:
  name: observability-backup-location
  namespace: velero
spec:
  provider: aws
  objectStorage:
    bucket: mlops-platform-backups
    prefix: model-observability-incident-platform
  config:
    region: us-east-1
---
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: observability-namespace-15m
  namespace: velero
spec:
  schedule: "*/15 * * * *"
  template:
    includedNamespaces:
      - ml-observability
    snapshotVolumes: true
    ttl: 168h0m0s
    storageLocation: observability-backup-location
---
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotClass
metadata:
  name: observability-retain-snapshots
driver: csi.example.com
deletionPolicy: Retain
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: incident-record-export
  namespace: ml-observability
spec:
  schedule: "*/15 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: export-incidents
              image: python:3.12-slim
              command: ["python", "-c", "print('export incidents, dedupe fingerprints, drift baselines, and eval reports')"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: restore-order
  namespace: ml-observability
data:
  restore-order.yaml: |
    - namespace-and-observability-crds
    - telemetry-baselines
    - incident-records
    - alert-routing
    - freshness-and-burn-rate-checks
