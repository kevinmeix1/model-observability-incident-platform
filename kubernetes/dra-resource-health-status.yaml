apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: observability-dra-resource-health-reader
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceclaims"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: observability-dra-resource-health-reader
subjects:
  - kind: ServiceAccount
    name: drift-evaluator
    namespace: ml-observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: observability-dra-resource-health-reader
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-dra-resource-health-queries
  namespace: mlops-observability
data:
  drift-pod-allocated-resources-status: "kubectl get pod embedding-drift-dra-check-0 -n mlops-observability -o jsonpath='{.status.containerStatuses[*].allocatedResourcesStatus}'"
  drift-resourceclaim-device-status: "kubectl get resourceclaim l4-shared-drift-claim -n mlops-observability -o jsonpath='{.status.devices}'"
  monitor-review-allocated-resources-status: "kubectl get pod large-monitor-review-0 -n mlops-observability -o jsonpath='{.status.containerStatuses[*].allocatedResourcesStatus}'"
  podresources-cross-check: "scrape kubelet PodResourcesLister DynamicResource claim_name, device_name, and resource_name for diagnostic pods"
  incident-policy: "keep CPU incident creation and rollout-freeze guidance live when DRA diagnostic health is Unhealthy or Unknown"
---
apiVersion: resource.k8s.io/v1beta2
kind: DeviceTaintRule
metadata:
  name: quarantine-unhealthy-observability-l4-device
spec:
  deviceSelector:
    driver: gpu.resource.kubernetes.io
    deviceClassName: gpu-l4-shared
  taint:
    key: gpu.resource.kubernetes.io/unhealthy
    value: ResourceHealthStatus
    effect: NoSchedule
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: observability-dra-resource-health-status
  namespace: mlops-observability
spec:
  groups:
    - name: observability.dra.resource.health
      rules:
        - alert: ObservabilityDRAResourceHealthUnhealthy
          expr: kube_pod_container_status_allocated_resources_health{namespace=~"mlops-observability|ml-observability",health=~"Unhealthy|Unknown"} > 0
          for: 2m
          labels:
            severity: warning
            incident_action: annotate_gpu_diagnostic_limitation
          annotations:
            summary: "A diagnostic DRA device is unhealthy or unknown"
        - alert: ObservabilityDRAResourceClaimDeviceStatusMissing
          expr: kube_resourceclaim_status_devices{namespace=~"mlops-observability|ml-observability"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ResourceClaim status.devices is missing for a DRA-backed observability workload"
