apiVersion: v1
kind: Pod
metadata:
  name: prediction-log-compactor
  namespace: mlops-observability
  labels:
    app.kubernetes.io/name: model-observability-incident-platform
    app.kubernetes.io/component: pod-resource-envelope
    platform.mlops.dev/gate-owner: telemetry-control
spec:
  schedulingGates:
    - name: mlops.kevinmei.dev/telemetry-window-ready
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      cpu: "3"
      memory: 6Gi
  restartPolicy: Never
  containers:
    - name: log-compactor
      image: ghcr.io/kevinmeix1/model-observability-incident-platform:2026.07.0
      command: ["python", "-m", "model_observability_platform", "reliability-plan"]
      resources:
        requests:
          cpu: 1200m
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 4Gi
    - name: otel-sidecar
      image: otel/opentelemetry-collector-contrib:0.136.0
      args: ["--config=/etc/otel/config.yaml"]
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
---
apiVersion: v1
kind: Pod
metadata:
  name: incident-root-cause-fanout
  namespace: mlops-observability
  labels:
    app.kubernetes.io/name: model-observability-incident-platform
    app.kubernetes.io/component: pod-resource-envelope
    platform.mlops.dev/gate-owner: incident-control
spec:
  schedulingGates:
    - name: mlops.kevinmei.dev/incident-evidence-ready
    - name: mlops.kevinmei.dev/kueue-admitted
  resources:
    requests:
      cpu: "5"
      memory: 10Gi
    limits:
      cpu: "7"
      memory: 14Gi
  restartPolicy: Never
  containers:
    - name: root-cause-worker
      image: ghcr.io/kevinmeix1/model-observability-incident-platform:2026.07.0
      command: ["python", "-m", "model_observability_platform", "demo"]
      resources:
        requests:
          cpu: "4"
          memory: 8Gi
        limits:
          cpu: "6"
          memory: 12Gi
    - name: evidence-writer
      image: ghcr.io/kevinmeix1/model-observability-incident-platform:2026.07.0
      command: ["python", "-m", "model_observability_platform", "trace-report"]
      resources:
        requests:
          cpu: 500m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: dashboard-publisher
  namespace: mlops-observability
  labels:
    app.kubernetes.io/name: model-observability-incident-platform
    app.kubernetes.io/component: pod-resource-envelope
    platform.mlops.dev/gate-owner: dashboard-control
spec:
  schedulingGates:
    - name: mlops.kevinmei.dev/policy-digest-ready
  resources:
    requests:
      cpu: "2"
      memory: 3Gi
    limits:
      cpu: "3"
      memory: 5Gi
  restartPolicy: Never
  containers:
    - name: dashboard-publisher
      image: ghcr.io/kevinmeix1/model-observability-incident-platform:2026.07.0
      command: ["python", "-m", "model_observability_platform", "demo"]
      resources:
        requests:
          cpu: 1200m
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 4Gi
    - name: checkpoint-writer
      image: ghcr.io/kevinmeix1/model-observability-incident-platform:2026.07.0
      command: ["python", "-m", "model_observability_platform", "supply-chain"]
      resources:
        requests:
          cpu: 400m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
