apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-memory-qos-kubelet-config
  namespace: mlops-observability
  labels:
    platform.mlops.dev/control: memory-qos
data:
  kubelet-config.yaml: |
    apiVersion: kubelet.config.k8s.io/v1beta1
    kind: KubeletConfiguration
    featureGates:
      MemoryQoS: true
    memoryReservationPolicy: TieredReservation
    memoryThrottlingFactor: 0.9
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: observability-memory-qos
  namespace: mlops-observability
spec:
  groups:
    - name: observability.memory-qos
      rules:
        - alert: ObservabilityMemoryQoSThrottlingHigh
          expr: max(rate(container_memory_high_events_total{namespace="mlops-observability"}[5m])) > 0.1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Memory QoS memory.high throttling is elevated for observability workloads
        - alert: IncidentRouterMemoryProtectionMissing
          expr: max(kube_pod_container_resource_requests{namespace="mlops-observability", pod=~".*incident-router.*", resource="memory"}) == 0
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: Incident router is missing memory requests for memory.min protection
        - alert: ObservabilityMemoryQoSKernelVersionWarning
          expr: max(kubelet_memory_qos_kernel_warning{node_pool=~"mlops-observability|mlops-gpu"}) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Memory QoS is enabled on a kernel below the recommended 5.9 floor
        - alert: ObservabilityMemoryQoSPSIPressureHigh
          expr: max(rate(kubelet_psi_memory_some_seconds_total{node_pool=~"mlops-observability|mlops-gpu"}[5m])) > 0.2
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: Memory PSI indicates node pressure before incident resolution
